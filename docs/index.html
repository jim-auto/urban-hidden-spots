<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urban Hidden Spots - 都市の穴場マップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; }
    #header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    #header h1 { font-size: 1.4rem; font-weight: 600; }
    #header .subtitle { font-size: 0.85rem; opacity: 0.7; }
    #city-selector {
      display: flex;
      gap: 8px;
    }
    .city-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .city-btn:hover, .city-btn.active {
      background: rgba(255,255,255,0.25);
      border-color: #4fc3f7;
    }
    #map { height: calc(100vh - 60px); width: 100%; }
    .score-popup {
      font-family: 'Segoe UI', sans-serif;
      min-width: 200px;
    }
    .score-popup h3 {
      margin: 0 0 8px;
      color: #1a1a2e;
      font-size: 1rem;
    }
    .score-popup .score-value {
      font-size: 1.8rem;
      font-weight: 700;
      color: #e65100;
      margin: 4px 0;
    }
    .score-popup .detail {
      font-size: 0.8rem;
      color: #555;
      line-height: 1.6;
    }
    .score-popup .detail span {
      font-weight: 600;
      color: #333;
    }
    .legend {
      background: white;
      padding: 10px 14px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      font-size: 0.8rem;
      line-height: 1.8;
    }
    .legend h4 { margin-bottom: 4px; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-circle {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div id="header">
    <div>
      <h1>Urban Hidden Spots</h1>
      <div class="subtitle">AI-powered discovery of hidden urban gems</div>
    </div>
    <div id="city-selector">
      <button class="city-btn active" data-city="all">All</button>
      <button class="city-btn" data-city="Tokyo (Shibuya)">Shibuya</button>
      <button class="city-btn" data-city="Osaka (Namba)">Namba</button>
      <button class="city-btn" data-city="Nagoya (Sakae)">Sakae</button>
    </div>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const CITY_CENTERS = {
      'all': [35.3, 137.0, 7],
      'Tokyo (Shibuya)': [35.6580, 139.7016, 15],
      'Osaka (Namba)': [34.6627, 135.5013, 15],
      'Nagoya (Sakae)': [35.1709, 136.9084, 15],
    };

    const map = L.map('map').setView([35.6580, 139.7016], 15);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19,
    }).addTo(map);

    let markers = [];

    function getColor(score) {
      if (score >= 0.7) return '#e65100';
      if (score >= 0.5) return '#ff9800';
      if (score >= 0.3) return '#ffc107';
      return '#8bc34a';
    }

    function getRadius(score) {
      return Math.max(6, score * 16);
    }

    function createPopup(props) {
      return `
        <div class="score-popup">
          <h3>${props.city}</h3>
          <div class="score-value">${props.hidden_score.toFixed(2)}</div>
          <div class="detail">
            <span>POI Density:</span> ${(props.poi_density * 100).toFixed(0)}%<br>
            <span>Pedestrian Space:</span> ${(props.pedestrian_space * 100).toFixed(0)}%<br>
            <span>Station Distance:</span> ${props.station_distance_m.toFixed(0)}m<br>
            <span>Station Score:</span> ${(props.station_distance_score * 100).toFixed(0)}%<br>
            <span>POI Count:</span> ${props.poi_count}
          </div>
        </div>
      `;
    }

    function displaySpots(data, cityFilter) {
      markers.forEach(m => map.removeLayer(m));
      markers = [];

      data.features.forEach(feature => {
        const props = feature.properties;
        if (cityFilter && cityFilter !== 'all' && props.city !== cityFilter) return;

        const [lon, lat] = feature.geometry.coordinates;
        const color = getColor(props.hidden_score);
        const radius = getRadius(props.hidden_score);

        const marker = L.circleMarker([lat, lon], {
          radius: radius,
          fillColor: color,
          color: '#fff',
          weight: 2,
          opacity: 0.9,
          fillOpacity: 0.75,
        }).addTo(map);

        marker.bindPopup(createPopup(props));
        markers.push(marker);
      });
    }

    // 凡例
    const legend = L.control({ position: 'bottomright' });
    legend.onAdd = function () {
      const div = L.DomUtil.create('div', 'legend');
      div.innerHTML = `
        <h4>Hidden Score</h4>
        <div class="legend-item"><span class="legend-circle" style="background:#e65100"></span> 0.7+  (Best)</div>
        <div class="legend-item"><span class="legend-circle" style="background:#ff9800"></span> 0.5 - 0.7</div>
        <div class="legend-item"><span class="legend-circle" style="background:#ffc107"></span> 0.3 - 0.5</div>
        <div class="legend-item"><span class="legend-circle" style="background:#8bc34a"></span> &lt; 0.3</div>
      `;
      return div;
    };
    legend.addTo(map);

    // 都市切り替え
    let geojsonData = null;
    document.querySelectorAll('.city-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.city-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const city = btn.dataset.city;
        const [lat, lon, zoom] = CITY_CENTERS[city];
        map.setView([lat, lon], zoom);
        if (geojsonData) displaySpots(geojsonData, city);
      });
    });

    // データ読み込み
    fetch('hidden_spots.geojson')
      .then(res => res.json())
      .then(data => {
        geojsonData = data;
        displaySpots(data, 'all');
      })
      .catch(err => {
        console.error('Failed to load hidden spots data:', err);
        document.getElementById('map').innerHTML =
          '<div style="padding:40px;text-align:center;color:#666;">' +
          '<h2>Data not yet generated</h2>' +
          '<p>Run <code>python scripts/fetch_osm_data.py</code> and ' +
          '<code>python scripts/calculate_hidden_score.py</code> first.</p></div>';
      });
  </script>
</body>
</html>
